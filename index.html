<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Kekslefant</title>
        <link rel="icon" type="image/png" href="img/Logo.png">
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>

    <body>
        <button id="shop-toggle">
            <img src="img/Shop.png" class="btn-icon" id="shop-icon">
            <span id="shop-text">Shop</span>
        </button>
        
        <button id="settings-toggle">
            <img src="img/Settings.png" class="btn-icon">
        </button>

        <div class="header-container">
            <a href="https://team-wurstwasser.com/" class="logo-link">
                <img class="logo" src="img/Logo.png">
                <span class="logo-text">Team Wurstwasser</span>
            </a>
        </div>

        <div class="game-container">
            <main class="main-area">
                <div class="stats">
                    <div id="cookie-count-display">
                        <span id="cookie-count">0</span> Cookies
                    </div>
                    <div class="cps-text">
                        pro Sekunde: <span id="cps-count">0</span>
                    </div>
                </div>

                <img id="cookie" src="img/Keks.svg" alt="Cookie" draggable="false">
            </main>

            <aside class="sidebar">
                <div class="shop-header">
                    <h2>Shop</h2>
                </div>
                <div class="shop-section">Upgrades</div>

                <div id="upgrade-list"></div>

                <div class="shop-section">Gebäude</div>

                <div id="factory-list"></div>
            </aside>
        </div>

        <div id="settings-overlay" class="overlay">
            <div class="settings-modal">
                <div class="settings-header">
                    <h2>Einstellungen</h2>
                    <button id="close-settings">
                        <img src="img/Close.png" class="btn-icon">
                    </button>
                </div>

                <div class="settings-content">
                    <div class="setting-item">
                        <span>Spielstand löschen</span>
                        <button id="reset-game" class="delete-btn">Reset</button>
                    </div>

                    <div class="setting-item">
                        <span>Save-Code erstellen</span>
                        <button id="export-save" class="setting-item-btn">Code bekommen</button>
                    </div>

                    <div class="setting-item">
                        <span>Save-Code laden</span>
                        <button id="import-save" class="setting-item-btn">Code eingeben</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="save-popup" class="overlay">
            <div class="settings-modal">
                <div class="settings-header">
                    <h2>Save-Code</h2>
                    <button id="close-save">
                        <img src="img/Close.png" class="btn-icon">
                    </button>
                </div>

                <div class="settings-content">
                    <textarea id="save-code-field" readonly></textarea>
                </div>
            </div>
        </div>

        <div id="load-popup" class="overlay">
            <div class="settings-modal">
                <div class="settings-header">
                    <h2>Save-Code</h2>
                    <button id="close-load">
                        <img src="img/Close.png" class="btn-icon">
                    </button>
                </div>
                
                <div class="settings-content">
                    <textarea id="load-code-field" placeholder="Code hier einfügen..."></textarea>
                    <button id="confirm-load" class="setting-item-btn">Laden</button>
                </div>
            </div>
        </div>
    </body>
</html>
