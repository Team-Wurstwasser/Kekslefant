<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Kekslefant</title>
        <link rel="icon" type="image/png" href="img/Logo.png">
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>

    <body>
        <button id="shop-toggle">🛒 Shop</button>
        <div class="header-container">
            <a href="https://team-wurstwasser.com/" class="logo-link">
                <img class="logo" src="img/Logo.png">
                <span class="logo-text">Team Wurstwasser</span>
            </a>
        </div>
        <div class="game-container">
            <main class="main-area">
                <div class="stats">
                    <div id="cookie-count-display">
                        <span id="cookie-count">0</span> Cookies
                    </div>
                    <div class="cps-text">
                        pro Sekunde: <span id="cps-count">0</span>
                    </div>
                </div>

                <div id="cookie">🍪</div>
            </main>

            <aside class="sidebar">
                <h2>Shop</h2>

                <div class="upgrade-item">
                    <div class="upgrade-info">
                        <img src="img/Schnecke.png" alt="Schnecke" class="upgrade-icon">
                        <div class="upgrade-texts">
                            <span class="upgrade-name">Schnecken-Zucht</span>
                            <span class="upgrade-desc">+1 Cookie/s</span>
                        </div>
                    </div>
                    <div class="upgrade-controls">
                        <span class="upgrade-amount" id="snail-amount">0</span>
                        <button id="buy-snail">Kaufen (<span id="snail-price">10</span> 🍪)</button>
                    </div>
                </div>

                <div class="upgrade-item">
                    <div class="upgrade-info">
                        <img src="img/Elefant.png" alt="Elefant" class="upgrade-icon">
                        <div class="upgrade-texts">
                            <span class="upgrade-name">Elefanten-Fabrik</span>
                            <span class="upgrade-desc">+10 Cookies/s</span>
                        </div>
                    </div>
                    <div class="upgrade-controls">
                        <span class="upgrade-amount" id="elephant-amount">0</span>
                        <button id="buy-elephant">Kaufen (<span id="elephant-price">100</span> 🍪)</button>
                    </div>
                </div>
            </aside>
        </div>
    </body>
</html>
