<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mein Cookie Clicker</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="stats">
            Cookies: <span id="cookie-count">0</span><br>
            <small>Pro Sekunde (CPS): <span id="cps-count">0</span></small>
        </div>

        <div id="cookie">🍪</div>

        <div class="shop">
            <h3>Upgrade Shop</h3>
            <p>Oma (produziert 1 Cookie/s)</p>
            <button id="buy-grandma" disabled>Kaufen (Preis: <span id="price">10</span>)</button>
        </div>
    </body>
</html>
