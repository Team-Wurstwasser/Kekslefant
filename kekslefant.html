<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mein Cookie Clicker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0e6d2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #cookie {
            width: 200px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        #cookie:active {
            transform: scale(0.9);
        }

        .stats {
            font-size: 24px;
            margin: 20px;
            font-weight: bold;
        }

        .shop {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #8b4513;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="stats">
        Cookies: <span id="cookie-count">0</span><br>
        <small>Pro Sekunde (CPS): <span id="cps-count">0</span></small>
    </div>

    <div id="cookie" style="font-size: 100px;">🍪</div>

    <div class="shop">
        <h3>Upgrade Shop</h3>
        <p>Oma (produziert 1 Cookie/s)</p>
        <button id="buy-grandma">Kaufen (Preis: <span id="price">10</span>)</button>
    </div>

    <script>
        // Spiel-Variablen
        let cookies = 0;
        let grandmas = 0;
        let grandmaPrice = 10;

        // HTML-Elemente referenzieren
        const cookieDisplay = document.getElementById('cookie-count');
        const cpsDisplay = document.getElementById('cps-count');
        const priceDisplay = document.getElementById('price');
        const cookieBtn = document.getElementById('cookie');
        const buyBtn = document.getElementById('buy-grandma');

        // Klick-Funktion
        cookieBtn.addEventListener('click', () => {
            cookies++;
            updateDisplay();
        });

        // Upgrade-Kauf
        buyBtn.addEventListener('click', () => {
            if (cookies >= grandmaPrice) {
                cookies -= grandmaPrice;
                grandmas++;
                grandmaPrice = Math.round(grandmaPrice * 1.5); // Preis steigt
                updateDisplay();
            }
        });

        // Anzeige aktualisieren
        function updateDisplay() {
            cookieDisplay.innerText = Math.floor(cookies);
            cpsDisplay.innerText = grandmas;
            priceDisplay.innerText = grandmaPrice;
            buyBtn.disabled = cookies < grandmaPrice;
        }

        // Der "Auto-Clicker" (läuft jede Sekunde)
        setInterval(() => {
            cookies += grandmas;
            updateDisplay();
        }, 1000);
    </script>
</body>
</html>
